<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

<section class="section">
    <h2>Our Creations</h2>
    <div class="grid">
        <div class="card" onclick="openProduct('Amigurumi Octopus', 'Handmade with soft milk cotton yarn.', ['assets/img/octo1.jpg', 'assets/img/octo2.jpg'])">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="https://instasize.com/p/8d4a97b98bb64cc2f479b7f13d6c56513c1d699eb864d4f9d3bf82abadf70fb0"></div>
                    <div class="swiper-slide"><img src="https://instasize.com/p/8d4a97b98bb64cc2f479b7f13d6c56513c1d699eb864d4f9d3bf82abadf70fb0"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <h4>Amigurumi Octopus</h4>
        </div>
    </div>
</section>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modal-swiper-container" class="swiper">
            <div class="swiper-wrapper" id="modal-slides"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>
        <div class="button-group">
            <a href="https://ig.me/m/giftedkknots" target="_blank" class="insta-btn">DM on Instagram</a>
            <a href="https://wa.me/+918284884619" target="_blank" class="whatsapp-btn">Message on WhatsApp</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // Initialize Mini Sliders
    const swiper = new Swiper(".mySwiper", {
        pagination: { el: ".swiper-pagination" },
        loop: true,
    });

    // Modal Logic
    function openProduct(title, desc, images) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc;
        
        const wrapper = document.getElementById('modal-slides');
        wrapper.innerHTML = ''; // Clear old images
        images.forEach(src => {
            wrapper.innerHTML += `<div class="swiper-slide"><img src="${src}" style="width:100%; height:400px; object-fit:contain;"></div>`;
        });

        document.getElementById('productModal').style.display = "block";
        
        // Initialize Modal Swiper
        new Swiper("#modal-swiper-container", {
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
            loop: true,
        });
    }

    function closeModal() {
        document.getElementById('productModal').style.display = "none";
    }
</script>
